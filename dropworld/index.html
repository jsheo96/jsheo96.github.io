<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>DROPWORLD — Imagine it. Drop it.</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#09090b;color:#fff;font-family:Inter,Pretendard,system-ui,sans-serif}canvas{position:fixed;inset:0;width:100%;height:100%;background:radial-gradient(circle at 50% 45%,#27282e,#0c0c0f 65%);cursor:crosshair}.glass{background:rgba(15,15,18,.76);border:1px solid #ffffff20;backdrop-filter:blur(16px);box-shadow:0 18px 55px #0008}.top{position:fixed;top:14px;left:14px;right:14px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;pointer-events:none}.brand{display:flex;align-items:center;gap:11px}.mark{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:#e8ff5b;color:#08080a;font-size:23px;font-weight:900}.brand b{letter-spacing:.16em;font-size:14px}.brand small{display:block;color:#ffffff88;margin-top:3px}.stats{font-size:12px;color:#ffffff88}.stats b{color:white}.rule{position:fixed;left:14px;top:94px;width:225px;padding:15px;border-radius:17px;pointer-events:none}.rule em{font-style:normal;font-size:10px;letter-spacing:.18em;color:#e8ff5b;font-weight:800}.rule p{font-size:13px;line-height:1.45;margin:8px 0 0}.feed{position:fixed;right:14px;top:94px;width:270px;padding:14px;border-radius:17px}.feed h2{font-size:11px;margin:0 0 10px;letter-spacing:.08em}.item{padding:9px 10px;margin-top:7px;border-radius:12px;background:#ffffff0b;border:1px solid #ffffff10;font-size:11px;line-height:1.4}.item b{color:#e8ff5b}.spot{position:fixed;left:50%;top:20%;width:min(680px,90vw);transform:translateX(-50%);text-align:center;text-shadow:0 4px 25px #000;pointer-events:none;opacity:0;transition:.25s}.spot.show{opacity:1}.spot small{color:#e8ff5b;letter-spacing:.2em;font-weight:900}.spot strong{display:block;font-size:clamp(22px,4vw,42px);line-height:1.15;margin:10px 0}.spot span{font-size:12px;color:#ffffffb0}.composer{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(900px,calc(100vw - 28px));border-radius:20px;padding:13px}.meta{font-size:10px;color:#ffffff88;margin:0 4px 8px;display:flex;gap:8px}.meta input{width:90px;color:white;background:transparent;border:0;border-bottom:1px solid #ffffff30;outline:0}.meta span{margin-left:auto}.row{display:flex;gap:9px}.row textarea{flex:1;resize:none;height:62px;border-radius:14px;border:1px solid #ffffff18;background:#ffffff0c;color:white;padding:13px;outline:0;font:inherit}.row textarea:focus{border-color:#e8ff5b66}.row button{width:105px;border:0;border-radius:14px;background:#e8ff5b;color:#09090b;font-weight:950;letter-spacing:.1em;cursor:pointer}.row button:disabled{opacity:.45}.chips{display:flex;gap:6px;margin-top:9px;overflow:hidden}.chips button{white-space:nowrap;border:1px solid #ffffff15;border-radius:999px;background:#ffffff08;color:#ffffffa8;padding:6px 9px;font-size:9px;cursor:pointer}.toast{position:fixed;left:50%;bottom:112px;transform:translateX(-50%);border-radius:999px;padding:8px 12px;font-size:11px;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1}@media(max-width:720px){.brand small,.rule{display:none}.feed{top:88px;right:9px;width:190px;max-height:180px;overflow:hidden}.top{top:9px;left:9px;right:9px}.composer{bottom:9px;width:calc(100vw - 18px)}.row button{width:78px}.chips button:nth-child(n+3){display:none}.meta span{display:none}}
</style>
</head>
<body>
<canvas id="world"></canvas>
<header class="top glass"><div class="brand"><div class="mark">↓</div><div><b>DROPWORLD</b><small>하나를 상상하고, 세계 위에 떨어뜨리세요.</small></div></div><div class="stats"><b id="online">2,418</b> online · <b id="count">0</b> drops</div></header>
<section class="rule glass"><em>THE ONLY RULE</em><p><b>한 문장</b>으로 사건 하나만 만드세요.<br>파괴하지 말고 세계를 잠시 변형시키세요.</p></section>
<aside class="feed glass"><h2>지금 주목받는 사건</h2><div id="events"></div></aside>
<div class="spot" id="spot"><small>WORLD SPOTLIGHT</small><strong id="spotText"></strong><span id="spotMeta"></span></div>
<section class="composer glass"><div class="meta">이름 <input id="name" maxlength="16" value="Jiseong"><span id="hint">화면을 눌러 투하 위치를 정하세요</span></div><div class="row"><textarea id="prompt" maxlength="120" placeholder="예: 거대한 슬픈 감자가 떨어져 사람들을 서로 위로하게 만든다."></textarea><button id="drop">DROP</button></div><div class="chips" id="chips"></div></section>
<div class="toast glass" id="toast"></div>
<script>
(()=>{'use strict';const c=document.querySelector('#world'),x=c.getContext('2d'),P=[],D=[],W=[],F=[],pal=['#ff6b93','#5ea8ff','#75f0a7','#ffe66d','#c69cff','#ff9ad5','#e8ff5b'],examples=['거대한 슬픈 감자가 떨어져 사람들을 서로 위로하게 만든다.','네온 고래가 빙글빙글 떨어져 모두 춤추게 만든다.','황금 왕관이 떨어져 사람들을 중앙으로 모은다.','젤리 눈알이 떨어져 모두 서로를 바라보게 만든다.'];let w,h,dpr=1,target=null,drops=0,last=0,lock=0;const $=s=>document.querySelector(s),rand=(a,b)=>Math.random()*(b-a)+a,pick=a=>a[Math.floor(Math.random()*a.length)],dist=(a,b,q,r)=>Math.hypot(a-q,b-r),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));function resize(){dpr=Math.min(devicePixelRatio||1,2);w=innerWidth;h=innerHeight;c.width=w*dpr;c.height=h*dpr;x.setTransform(dpr,0,0,dpr,0,0);while(P.length<Math.min(320,Math.max(100,Math.floor(w*h/5200))))P.push(person())}function person(){return{x:rand(15,w-15),y:rand(95,Math.max(130,h-155)),vx:rand(-10,10),vy:rand(-10,10),s:rand(.75,1.2),p:rand(0,6.28),col:pick(pal),fx:'idle',until:0,o:null}}const shapes=[['heart',['하트','사랑']],['fish',['고래','물고기']],['potato',['감자']],['eye',['눈알','눈']],['crown',['왕관']],['star',['별']],['cloud',['구름']],['sun',['태양']],['orb',[]]],effects=[['dance',['춤','춤추']],['gather',['모으','집결','중앙']],['flee',['도망','흩어']],['jump',['점프','뛰']],['look',['바라','쳐다']],['comfort',['위로','안아']],['spin',['회전','빙글']],['freeze',['얼','멈추']],['dance',[]]];function parse(t){let sh=shapes.find(v=>v[1].some(k=>t.includes(k)))||shapes.at(-1),ef=effects.find(v=>v[1].some(k=>t.includes(k)))||effects.at(-1),color=t.includes('빨')?'#ff6b6b':t.includes('파')?'#5ea8ff':t.includes('황금')?'#ffd166':t.includes('초록')?'#75f0a7':t.includes('보라')?'#c69cff':pick(pal);return{shape:sh[0],effect:ef[0],color}}function create(text,creator,pos,npc=false){text=text.trim().replace(/\s+/g,' ').slice(0,120);if(!text)return say('한 문장을 입력하세요.');if(!npc&&performance.now()<lock)return;let spec=parse(text),px=clamp(pos?.x??rand(w*.25,w*.75),45,w-45),py=clamp(pos?.y??rand(h*.3,h*.68),100,h-150),r=clamp(Math.min(w,h)*rand(.15,.22),90,210),hit=P.filter(p=>dist(p.x,p.y,px,py)<r);D.push({text,creator:creator||'anonymous',x:px,y:py,cy:-60,r,spec,st:performance.now(),land:0,hit:hit.length});drops++;$('#count').textContent=drops;show(text,creator,hit.length);feed(text,creator,hit.length);if(!npc){$('#prompt').value='';lock=performance.now()+2500;$('#drop').disabled=true;setTimeout(()=>$('#drop').disabled=false,2500)}}function show(t,n,k){$('#spotText').textContent='“'+t+'”';$('#spotMeta').textContent=(n||'anonymous')+' · '+k+'명의 인간이 영향을 받았습니다';$('#spot').classList.add('show');clearTimeout(show.t);show.t=setTimeout(()=>$('#spot').classList.remove('show'),3000)}function feed(t,n,k){let e=document.createElement('div');e.className='item';e.innerHTML='<b>'+esc(n||'anonymous')+'</b> · '+k+'명 영향<br>'+esc(t);$('#events').prepend(e);while($('#events').children.length>4)$('#events').lastChild.remove()}function esc(s){return String(s).replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]))}function say(t){$('#toast').textContent=t;$('#toast').classList.add('show');clearTimeout(say.t);say.t=setTimeout(()=>$('#toast').classList.remove('show'),1500)}function apply(d,now){W.push({x:d.x,y:d.y,r:d.r,st:now,col:d.spec.color});for(const p of P)if(dist(p.x,p.y,d.x,d.y)<d.r){p.fx=d.spec.effect;p.until=now+rand(5500,9000);p.o={x:d.x,y:d.y};p.col=d.spec.color}}function update(dt,now){for(const p of P){p.p+=dt*2;if(now>p.until)p.fx='idle';if(p.fx==='gather'){p.vx+=(p.o.x-p.x)*dt*.7;p.vy+=(p.o.y-p.y)*dt*.7}else if(p.fx==='flee'){let a=Math.atan2(p.y-p.o.y,p.x-p.o.x);p.vx+=Math.cos(a)*50*dt;p.vy+=Math.sin(a)*50*dt}else if(p.fx==='spin'){let a=Math.atan2(p.y-p.o.y,p.x-p.o.x)+1.57;p.vx+=Math.cos(a)*65*dt;p.vy+=Math.sin(a)*65*dt}else if(p.fx==='dance'){p.vx+=Math.sin(p.p*4)*18*dt;p.vy+=Math.cos(p.p*3)*18*dt}else if(p.fx==='freeze'){p.vx*=.8;p.vy*=.8}else{p.vx+=rand(-4,4)*dt;p.vy+=rand(-4,4)*dt}let sp=Math.hypot(p.vx,p.vy),mx=p.fx==='flee'||p.fx==='spin'?65:25;if(sp>mx){p.vx=p.vx/sp*mx;p.vy=p.vy/sp*mx}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.992;p.vy*=.992;if(p.x<8||p.x>w-8)p.vx*=-1;if(p.y<84||p.y>h-135)p.vy*=-1;p.x=clamp(p.x,8,w-8);p.y=clamp(p.y,84,h-135)}for(const d of D){if(!d.land){let t=clamp((now-d.st)/850,0,1);d.cy=-60+(d.y+60)*(1-(1-t)**3);if(t===1){d.land=now;apply(d,now)}}}for(let i=D.length-1;i>=0;i--)if(D[i].land&&now-D[i].land>1300)D.splice(i,1);for(let i=W.length-1;i>=0;i--)if(now-W[i].st>1000)W.splice(i,1)}function shape(s,r){x.beginPath();if(s==='heart'){x.moveTo(0,r);x.bezierCurveTo(-r*1.4,0,-r,-r,0,-r*.35);x.bezierCurveTo(r,-r,r*1.4,0,0,r)}else if(s==='fish'){x.ellipse(-r*.15,0,r*.7,r*.4,0,0,6.28);x.moveTo(r*.45,0);x.lineTo(r,-r*.45);x.lineTo(r,r*.45);x.closePath()}else if(s==='potato')x.ellipse(0,0,r*.75,r*.55,.4,0,6.28);else if(s==='eye'){x.moveTo(-r,0);x.quadraticCurveTo(0,-r*.7,r,0);x.quadraticCurveTo(0,r*.7,-r,0)}else if(s==='crown'){x.moveTo(-r,-r*.4);x.lineTo(-r*.6,r*.6);x.lineTo(r*.6,r*.6);x.lineTo(r,-r*.4);x.lineTo(r*.35,0);x.lineTo(0,-r*.7);x.lineTo(-r*.35,0);x.closePath()}else if(s==='star'){for(let i=0;i<10;i++){let a=-1.57+i*Math.PI/5,rr=i%2?r*.45:r;i?x.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):x.moveTo(Math.cos(a)*rr,Math.sin(a)*rr)}x.closePath()}else if(s==='cloud'){x.arc(-r*.4,0,r*.4,0,6.28);x.arc(0,-r*.2,r*.5,0,6.28);x.arc(r*.4,0,r*.38,0,6.28)}else x.arc(0,0,r*.7,0,6.28)}function draw(now){x.clearRect(0,0,w,h);x.strokeStyle='#ffffff0a';for(let i=0;i<w;i+=44){x.beginPath();x.moveTo(i,0);x.lineTo(i,h);x.stroke()}for(let i=0;i<h;i+=44){x.beginPath();x.moveTo(0,i);x.lineTo(w,i);x.stroke()}for(const p of P){let jump=p.fx==='jump'?Math.abs(Math.sin(p.p*4))*9:0,lean=p.fx==='comfort'?.65:Math.sin(p.p)*.05;x.save();x.translate(p.x,p.y-jump);x.rotate(lean);x.fillStyle='#0005';x.beginPath();x.ellipse(0,9,5,2,0,0,6.28);x.fill();x.fillStyle=p.col;x.fillRect(-2.4,-1,4.8,9);x.beginPath();x.arc(0,-5,3.8,0,6.28);x.fill();x.strokeStyle=p.col;x.lineWidth=1.5;x.beginPath();x.moveTo(-2,2);x.lineTo(-5,5);x.moveTo(2,2);x.lineTo(5,5);x.moveTo(-1.4,8);x.lineTo(-2.5,13);x.moveTo(1.4,8);x.lineTo(2.5,13);x.stroke();x.restore()}for(const q of W){let t=(now-q.st)/1000;x.globalAlpha=1-t;x.strokeStyle=q.col;x.lineWidth=3*(1-t);x.beginPath();x.arc(q.x,q.y,q.r*t,0,6.28);x.stroke();x.globalAlpha=1}for(const d of D){x.save();x.translate(d.x,d.land?d.y:d.cy);let a=d.land?1-(now-d.land)/1300:1;x.globalAlpha=clamp(a,0,1);x.fillStyle=d.spec.color;x.shadowColor=d.spec.color;x.shadowBlur=26;shape(d.spec.shape,30);x.fill();x.strokeStyle='#fff';x.lineWidth=1.5;x.stroke();x.restore()}if(target){x.strokeStyle='#e8ff5b';x.lineWidth=1.5;x.beginPath();x.arc(target.x,target.y,13+Math.sin(now/180)*3,0,6.28);x.stroke();x.beginPath();x.moveTo(target.x-18,target.y);x.lineTo(target.x+18,target.y);x.moveTo(target.x,target.y-18);x.lineTo(target.x,target.y+18);x.stroke()}}function loop(now){let dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt,now);draw(now);$('#online').textContent=Math.round(2418+Math.sin(now/4000)*75).toLocaleString();requestAnimationFrame(loop)}c.addEventListener('pointerdown',e=>{target={x:e.clientX,y:clamp(e.clientY,85,h-135)};$('#hint').textContent='선택한 위치에 투하합니다'});$('#drop').onclick=()=>create($('#prompt').value,$('#name').value,target);$('#prompt').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('#drop').click()}};for(const t of examples){let b=document.createElement('button');b.textContent=t;b.onclick=()=>{$('#prompt').value=t;$('#prompt').focus()};$('#chips').append(b)}addEventListener('resize',resize);resize();requestAnimationFrame(loop);setTimeout(()=>create(examples[1],'Luna',{x:w*.63,y:h*.45},true),800);setTimeout(()=>create(examples[2],'Miro',{x:w*.38,y:h*.56},true),3800);setInterval(()=>{if(!document.hidden)create(pick(examples),pick(['Nova','Pixel','Bora','Momo']),{x:rand(w*.25,w*.75),y:rand(h*.3,h*.65)},true)},8500)})();
</script>
